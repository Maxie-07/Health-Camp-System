spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/healthcamp
    username: healthcamp
    password: changeme
  data:
    redis:
      host: localhost
      port: 6380

healthcamp:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-32-chars}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:8081}
    origin-patterns: ${CORS_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  sms:
    provider: ${SMS_PROVIDER:mock}

logging:
  level:
    com.healthcamp: DEBUG
    org.springframework.security: INFO
