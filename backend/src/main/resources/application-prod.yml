spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/healthcamp}
    username: ${SPRING_DATASOURCE_USERNAME:healthcamp}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

healthcamp:
  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:8081}
    origin-patterns: ${CORS_ORIGIN_PATTERNS:}
  sms:
    provider: ${SMS_PROVIDER:mock}

logging:
  level:
    root: WARN
    com.healthcamp: INFO
