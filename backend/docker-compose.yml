services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: healthcamp
      POSTGRES_USER: healthcamp
      POSTGRES_PASSWORD: changeme
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcamp -d healthcamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.5
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
