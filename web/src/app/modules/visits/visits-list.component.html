<div class="mb-8">
  <h2 class="text-2xl font-semibold text-slate-900">Visits</h2>
  <p class="mt-1 text-sm text-slate-500">Recent beneficiary visit records</p>
</div>

<p-card styleClass="border border-slate-200 shadow-sm">
  <p-table
    [value]="visits"
    [paginator]="true"
    [rows]="10"
    styleClass="p-datatable-sm"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template #header>
      <tr>
        <th>Beneficiary</th>
        <th>Date</th>
        <th>Diagnosis</th>
        <th>Treatment</th>
      </tr>
    </ng-template>
    <ng-template #body let-visit>
      <tr>
        <td class="font-medium">{{ visit.beneficiaryName }}</td>
        <td>{{ visit.visitDate | date: 'medium' }}</td>
        <td>{{ visit.diagnosis || '—' }}</td>
        <td>{{ visit.treatment || '—' }}</td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="4" class="py-8 text-center text-slate-500">No visits recorded yet.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
