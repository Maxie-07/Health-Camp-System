<div class="mb-8">
  <h2 class="text-2xl font-semibold text-slate-900">Admin</h2>
  <p class="mt-1 text-sm text-slate-500">User management overview</p>
</div>

<p-card styleClass="border border-slate-200 shadow-sm">
  <p-table [value]="users" styleClass="p-datatable-sm">
    <ng-template #header>
      <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Status</th>
      </tr>
    </ng-template>
    <ng-template #body let-user>
      <tr>
        <td class="font-medium">{{ user.username }}</td>
        <td><p-tag [value]="user.role" severity="info" /></td>
        <td>
          <p-tag
            [value]="user.active ? 'Active' : 'Inactive'"
            [severity]="user.active ? 'success' : 'secondary'"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
