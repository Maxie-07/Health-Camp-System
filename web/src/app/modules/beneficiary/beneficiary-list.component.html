<div class="mb-8">
  <h2 class="text-2xl font-semibold text-slate-900">Beneficiaries</h2>
  <p class="mt-1 text-sm text-slate-500">Register and manage camp beneficiaries</p>
</div>

<p-card styleClass="mb-6 border border-slate-200 shadow-sm">
  <p-toolbar styleClass="border-0 bg-transparent p-0 mb-4">
    <ng-template #start>
      <span class="text-sm font-medium text-slate-600">Register new beneficiary</span>
    </ng-template>
  </p-toolbar>

  <form [formGroup]="form" (ngSubmit)="create()" class="grid gap-4 md:grid-cols-4">
    <p-floatlabel variant="on">
      <input pInputText id="fullName" formControlName="fullName" class="w-full" />
      <label for="fullName">Full name</label>
    </p-floatlabel>

    <p-floatlabel variant="on">
      <input pInputText id="phone" formControlName="phone" class="w-full" />
      <label for="phone">Phone</label>
    </p-floatlabel>

    <p-floatlabel variant="on">
      <input pInputText id="campLocation" formControlName="campLocation" class="w-full" />
      <label for="campLocation">Camp location</label>
    </p-floatlabel>

    <div class="flex items-end">
      <p-button type="submit" label="Register" icon="pi pi-user-plus" [disabled]="form.invalid" />
    </div>
  </form>
</p-card>

<p-card styleClass="border border-slate-200 shadow-sm">
  <p-table
    [value]="beneficiaries"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 20]"
    styleClass="p-datatable-sm"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>QR Code</th>
        <th>Location</th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td class="font-medium">{{ item.fullName }}</td>
        <td>{{ item.phone || '—' }}</td>
        <td><code class="rounded bg-slate-100 px-2 py-1 text-xs">{{ item.qrCode }}</code></td>
        <td>{{ item.campLocation || '—' }}</td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="4" class="py-8 text-center text-slate-500">No beneficiaries registered yet.</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
