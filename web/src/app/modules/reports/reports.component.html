<div class="mb-8">
  <h2 class="text-2xl font-semibold text-slate-900">Reports</h2>
  <p class="mt-1 text-sm text-slate-500">Daily camp activity summaries</p>
</div>

<p-card styleClass="mb-6 border border-slate-200 shadow-sm">
  <form [formGroup]="form" (ngSubmit)="load()" class="flex flex-wrap items-end gap-4">
    <div class="flex flex-col gap-2">
      <label for="reportDate" class="text-sm font-medium text-slate-600">Report date</label>
      <p-datePicker
        inputId="reportDate"
        formControlName="date"
        [showIcon]="true"
        dateFormat="yy-mm-dd"
      />
    </div>
    <p-button type="submit" label="Load report" icon="pi pi-search" />
  </form>
</p-card>

<div class="grid gap-5 md:grid-cols-3" *ngIf="report as r">
  <p-card styleClass="border border-slate-200 shadow-sm">
    <p class="text-sm font-medium text-slate-500">Report date</p>
    <p class="mt-2 text-2xl font-bold text-slate-900">{{ r.date }}</p>
  </p-card>
  <p-card styleClass="border border-slate-200 shadow-sm">
    <p class="text-sm font-medium text-slate-500">Total visits</p>
    <p class="mt-2 text-2xl font-bold text-cyan-700">{{ r.totalVisits }}</p>
  </p-card>
  <p-card styleClass="border border-slate-200 shadow-sm">
    <p class="text-sm font-medium text-slate-500">Low stock items</p>
    <p class="mt-2 text-2xl font-bold text-amber-700">{{ r.lowStockItems }}</p>
  </p-card>
</div>
